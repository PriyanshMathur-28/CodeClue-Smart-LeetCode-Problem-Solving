<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts: Google Fonts (Inter) & Font Awesome for icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>CodeClue: Professional AI Assistant</title>
    <style>
        /* --- 1. THEME & GLOBAL STYLES --- */
        :root {
            --bg-main: #F8F9FA; /* Main background */
            --bg-card: #FFFFFF; /* Card background */
            --bg-inset: #F1F3F5; /* Background for nested components */
            --primary: #4F46E5;
            --accent-green: #10B981;
            --accent-orange: #F59E0B;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.07);
            --radius: 12px;
        }

        @font-face {
            font-family: 'WensleyDemo';
            src: url('WensleyDemo.ttf') format('truetype');
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-width: 400px;
            min-height: 580px;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .popup-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- 2. HEADER & BRANDING --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 8px;
        }
        .brand-logo { height: 32px; }
        .brand-name {
            font-family: 'WensleyDemo', sans-serif;
            font-size: 26px;
            color: var(--primary);
        }
        
        /* --- 3. TOGGLE SWITCH --- */
        .toggle-container {
            display: flex;
            justify-content: center;
        }
        .toggle-switch {
            position: relative;
            width: 280px;
            height: 44px;
            background-color: var(--border-color);
            border-radius: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            box-sizing: border-box;
        }
        .toggle-slider {
            position: absolute;
            left: 4px;
            width: calc(50% - 4px);
            height: 36px;
            background: var(--bg-card);
            border-radius: 18px;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .toggle-switch.active .toggle-slider {
            transform: translateX(100%);
        }
        .toggle-label {
            flex: 1;
            text-align: center;
            font-weight: 600;
            z-index: 1;
            transition: color 0.3s ease;
            user-select: none;
        }
        .toggle-label.left { color: var(--primary); }
        .toggle-label.right { color: var(--text-secondary); }
        .toggle-switch.active .toggle-label.left { color: var(--text-secondary); }
        .toggle-switch.active .toggle-label.right { color: var(--primary); }
        
        /* --- 4. CARD-BASED SECTIONS --- */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title .fa-solid {
            color: var(--primary);
            width: 16px;
            text-align: center;
        }

        /* --- 5. BUTTONS & INTERACTIVE ELEMENTS --- */
        .btn {
            background-color: var(--primary);
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover:not(:disabled) {
            background-color: #4338CA;
            transform: translateY(-1px);
        }
        .btn:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            box-sizing: border-box;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        #hint-answer { 
            min-height: 150px; 
            margin-bottom: 20px;
        }
        #code-feedback {
            min-height: 150px;
        }

        /* --- 6. CODE ANALYSIS STATS --- */
        .stats-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .score-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- 7. DISTINCT CHAT MODULE --- */
        .chat-wrapper {
            background-color: var(--bg-inset);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px;
        }
        .chat-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-messages {
            max-height: 120px;
            min-height: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 4px;
            margin-bottom: 16px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: #FFFFFF;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .chat-input-group {
            display: flex;
            gap: 8px;
        }
        #chat-input { flex: 1; }
        #send-btn {
            background-color: var(--primary);
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            padding: 0;
        }
        
        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        #not-leetcode { text-align: center; padding: 40px 20px; }
        #not-leetcode h4 { color: #D92D20; font-weight: 700; font-size: 18px; }
    </style>
</head>
<body>
    <div id="main-ui" class="popup-container" style="display: none; margin-top: -15px;">
        <header class="header">
            <img src="codeclue2.png" alt="CodeClue Logo" class="brand-logo">
            <h1 class="brand-name">CodeClue</h1>
        </header>

        <div class="toggle-container" >
            <div class="toggle-switch" id="mode-toggle">
                <div class="toggle-slider"></div>
                <div class="toggle-label left">AI Hint</div>
                <div class="toggle-label right">Code Check</div>
            </div>
        </div>

        <!-- AI Hint Section -->
        <section id="hint-mode" class="card" style="margin-top: 15px;">
            <h3 class="card-title">
                <i class="fa-solid fa-lightbulb" style="color: var(--accent-green);"></i>
                AI Hint
            </h3>
            <button type="button" class="btn" id="hint-button" style="margin-bottom: 16px; background-color: var(--accent-green);">
                <i class="fa-solid fa-wand-magic-sparkles"></i>Generate Hint
            </button>
            <textarea id="hint-answer" readonly placeholder="Click 'Generate Hint' to get a smart suggestion..."></textarea>
            
            <!-- This is the new, clearly differentiated chat module -->
            <div class="chat-wrapper">
                <h4 class="chat-title">
                    <i class="fa-solid fa-comments"></i>
                    Follow-up Chat
                </h4>
                <div class="chat-messages" id="chat-messages">
                    <div class="message ai-message">Need more help? Ask a follow-up question.</div>
                </div>
                <div class="chat-input-group">
                    <input type="text" id="chat-input" placeholder="e.g., Explain time complexity...">
                    <button id="send-btn" title="Send Message" class="btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <!-- Code Check Section -->
        <section id="code-check-mode" class="card hidden" style="margin-top: 10px;">
            <h3 class="card-title">
                <i class="fa-solid fa-vial" style="color: var(--accent-orange);"></i>
                Code Analysis
            </h3>
            <div class="stats-container">
                <div class="score-display" id="correctness-percentage">--%</div>
                <div class="score-label">Overall Score</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
            <button class="btn" id="check-code-button" style="margin-bottom: 16px; background-color: var(--accent-orange);">
                <i class="fa-solid fa-microscope"></i>Analyze My Code
            </button>
            <textarea id="code-feedback" readonly placeholder="Get detailed feedback on correctness and efficiency here..."></textarea>
        </section>
    </div>

    <!-- Message for non-LeetCode sites -->
    <div id="not-leetcode" style="display: none;">
        <h4>⚠️ Not a LeetCode Page</h4>
        <p>Please navigate to a LeetCode problem to use CodeClue.</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
